<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Acar</title>
    <meta name="author" content="Yusuf Acar">
    <meta property="og:title" content="Yusuf Acar">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/terminal.css">
</head>

<body>

    <!-- Background layers -->
    <canvas id="starfield"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <canvas id="matrix-canvas"></canvas>

    <!-- Terminal window -->
    <div class="terminal-window">
        <div class="title-bar">
            <div class="title-bar-btn btn-close"></div>
            <div class="title-bar-btn btn-minimize"></div>
            <div class="title-bar-btn btn-maximize"></div>
            <div class="title-bar-text">yusuf@earth: <span id="promptPath">~</span></div>
        </div>

        <div class="terminal-body" id="terminal">
            <!-- Output gets injected here by terminal.js -->
        </div>

        <!-- DOOM game container (hidden by default) -->
        <div id="doom-container">
            <canvas id="doom-canvas"></canvas>
            <div id="doom-hud">
                <div class="doom-hud-item">
                    <span>♥</span>
                    <div class="doom-health-bar">
                        <div class="doom-health-fill" id="doom-health-fill" style="width:100%"></div>
                    </div>
                    <span id="doom-health-text">100</span>
                </div>
                <div class="doom-hud-item">
                    <span class="yellow">⚡</span>
                    <span>AMMO: <span id="doom-ammo-text">50</span></span>
                </div>
                <div class="doom-hud-item">
                    <span class="magenta">★</span>
                    <span>SCORE: <span id="doom-score-text">0</span></span>
                </div>
                <div class="doom-exit-hint">ESC or F10 to exit</div>
            </div>
        </div>

        <div class="input-line" id="inputLine" style="display:none;">
            <div class="input-prompt">
                <span class="prompt-symbol">❯</span>
                <span class="prompt-path" id="promptPathInput">~</span>
                <span class="prompt-arrow">$</span>
            </div>
            <input type="text" id="cmdInput" autocomplete="off" spellcheck="false" autofocus>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>ONLINE</span>
            </div>
            <div>
                <span id="statusTime"></span>
            </div>
            <div>UTF-8 | bash 5.1</div>
        </div>
    </div>

    <!-- Scripts (order matters: filesystem → commands → doom → terminal → starfield) -->
    <script src="js/starfield.js"></script>
    <script src="js/filesystem.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/doom.js"></script>
    <script src="js/terminal.js"></script>

</body>

</html>
